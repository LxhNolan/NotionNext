<!DOCTYPE html>
<html>
<head>
    <style>
        /* 主界面样式 */
        .main-menu { 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }
        .arena {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            border-radius: 15px;
            padding: 20px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
        }
        /* 红包样式 */
        .red-envelope {
            width: 200px;
            height: 240px;
            background: #e4393c;
            border-radius: 10px;
            position: relative;
            animation: float 2s infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 主菜单 -->
        <div id="main-menu" class="main-menu">
            <div class="arena" data-level="novice">新手场</div>
            <div class="arena" data-level="primary">初级场</div>
            <!-- 其他场次... -->
        </div>

        <!-- 游戏界面 -->
        <div id="game-interface" style="display:none;">
            <div id="countdown">30</div>
            <div id="red-envelope" class="red-envelope"></div>
            <button id="start-btn">开始抢红包</button>
        </div>
    </div>

<script>
let gameState = {
    currentLevel: null,
    playerBalance: 5000,
    aiPlayers: [
        { id: 1, balance: 10000, delay: 3000 },
        // 其他AI玩家...
    ],
    levels: {
        novice: { stake: 100, color: "#4CAF50" },
        primary: { stake: 200, color: "#2196F3" },
        // 其他场次配置...
    }
}

// 初始化游戏
function initGame() {
    // 场次选择事件
    document.querySelectorAll('.arena').forEach(arena => {
        arena.addEventListener('click', () => enterArena(arena.dataset.level));
    });

    // 红包点击事件
    document.getElementById('red-envelope').addEventListener('click', joinRedPacket);
}

// 进入场次
function enterArena(level) {
    gameState.currentLevel = level;
    // 更新界面样式
    document.body.style.backgroundColor = gameState.levels[level].color;
    // 初始化AI玩家
    initAIPlayers();
}

// AI行为模拟
function initAIPlayers() {
    gameState.aiPlayers.forEach(ai => {
        const delay = Math.random() * 27000 + 3000; // 3-30秒随机延迟
        setTimeout(() => {
            if(ai.balance >= gameState.currentStake) {
                joinRedPacket(ai);
            }
        }, delay);
    });
}

// 红包分配算法（参考微信随机算法[1,5](@ref)）
function distributeFunds(total) {
    let amounts = [];
    let remaining = total;
    for(let i=0; i<7; i++) {
        let max = remaining - (7-i)*0.01;
        let amount = Math.random() * max;
        amount = Math.floor(amount*100)/100;
        amounts.push(amount);
        remaining -= amount;
    }
    amounts.push(remaining);
    
    // 处理最大最小值[6](@ref)
    const maxAmount = Math.max(...amounts) * 2;
    const minAmount = Math.min(...amounts) / 2;
    // 重新平衡总额...
    return amounts;
}

// 数据持久化（使用localStorage[8](@ref)）
function saveGameState() {
    localStorage.setItem('redPacketGame', JSON.stringify(gameState));
}
</script>
</body>
</html>
