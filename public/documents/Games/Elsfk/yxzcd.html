<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Arial', sans-serif;
            touch-action: none; /* 禁用默认触摸行为 */
        }
        #menu {
            text-align: center;
        }
        #menu h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #f39c12;
        }
        #menu button {
            margin: 10px;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 10px;
            transition: background-color 0.3s ease;
        }
        #menu button:hover {
            background-color: #555;
        }
        #game-container {
            display: none;
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(10, 25px);
            grid-template-rows: repeat(20, 25px);
            gap: 2px;
            background-color: #222;
            border: 5px solid #444;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        #next-piece {
            display: grid;
            grid-template-columns: repeat(6, 25px);
            grid-template-rows: repeat(6, 25px);
            gap: 2px;
            background-color: #222;
            border: 5px solid #444;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            padding: 10px;
        }
        .cell {
            width: 25px;
            height: 25px;
            background-color: #333;
            border-radius: 3px;
        }
        .tetromino {
            background-color: #f39c12;
            border: 2px solid #e67e22;
        }
        .taken {
            background-color: #2ecc71;
            border: 2px solid #27ae60;
        }
        #score {
            font-size: 24px;
            color: #f39c12;
            margin-top: 20px;
        }
        #controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        #controls button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        #controls button:hover {
            background-color: #555;
        }
        #footer {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            color: #888;
            text-align: center;
        }
        #footer a {
            color: #f39c12;
            text-decoration: none;
        }
        #footer a:hover {
            text-decoration: underline;
        }
        #mobile-controls {
            display: none;
            justify-content: space-around;
            margin-top: 20px;
            width: 100%;
        }
        #mobile-controls button {
            padding: 15px 25px;
            font-size: 18px;
            background-color: #444;
            color: #fff;
            border: none;
            border-radius: 10px;
        }
        @media (max-width: 600px) {
            #mobile-controls {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>俄罗斯方块</h1>
        <button id="easy">简单</button>
        <button id="normal">普通</button>
        <button id="hard">困难</button>
        <button id="god-mode">无敌</button>
        <button id="exit" onclick="window.location.href='https://www.happinessrailway.com'">退出</button>
        <button id="close-tab">关闭当前标签页</button>
    </div>
    <div id="game-container">
        <div id="game-board"></div>
        <div id="right-panel">
            <div id="next-piece"></div>
            <div id="score">分数: 0</div>
            <div id="controls">
                <button id="pause">暂停</button>
                <button id="restart">重新开始</button>
                <button id="end-game">结束游戏并统计分数</button>
            </div>
        </div>
    </div>
    <div id="mobile-controls">
        <button id="mobile-left">←</button>
        <button id="mobile-right">→</button>
        <button id="mobile-rotate">↻</button>
        <button id="mobile-flip">↔</button>
        <button id="mobile-down">↓</button>
    </div>
    <div id="footer">
        Copyright©2024-2025 LxhNolan All rights reserved. Powered by <a href="https://www.deepseek.com" target="_blank">DeepSeek</a>.
    </div>
    <script src="tetris.js"></script>
</body>
</html>
