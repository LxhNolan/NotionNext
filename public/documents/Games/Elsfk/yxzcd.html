<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>俄罗斯方块</title>
    <style>
        /* 基础样式保持不变，新增移动端优化 */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation; /* 禁用默认触摸行为 */
        }

        /* 移动端控制按钮 */
        #mobile-controls {
            display: none; /* 默认隐藏，移动端显示 */
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .control-btn {
            width: 60px;
            height: 60px;
            background-color: #333;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            user-select: none;
        }
        .control-btn:active {
            background-color: #555;
        }

        /* 横屏提示 */
        #orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            #game-container {
                transform: scale(0.8); /* 缩小游戏区域 */
            }
            #mobile-controls {
                display: grid;
            }
            #controls button {
                padding: 15px 25px;
                font-size: 18px;
            }
        }

        @media (orientation: portrait) {
            #orientation-warning {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <!-- 横屏提示 -->
    <div id="orientation-warning">
        <div style="text-align: center; padding: 20px;">
            <h2>请横屏游玩以获得最佳体验</h2>
        </div>
    </div>

    <!-- 原有菜单和游戏容器保持不变 -->
    <div id="menu">
        <!-- ...原有菜单按钮... -->
    </div>
    <div id="game-container">
        <!-- ...原有游戏界面... -->
    </div>

    <!-- 新增移动端控制按钮 -->
    <div id="mobile-controls">
        <div class="control-btn" id="mobile-left">←</div>
        <div class="control-btn" id="mobile-down">↓</div>
        <div class="control-btn" id="mobile-right">→</div>
        <div class="control-btn" id="mobile-rotate">↺</div>
        <div class="control-btn" id="mobile-flip">↔</div>
    </div>

    <!-- 页脚保持不变 -->
    <div id="footer">...</div>
    
    <script src="tetris.js"></script>
</body>
</html>
